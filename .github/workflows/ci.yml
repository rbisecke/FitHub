name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "docs/**"
      - "test/**"
      - "hotfix/**"
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C apps/web typecheck

      - name: Lint
        run: pnpm -C apps/web lint

      - name: Test
        run: pnpm -C apps/web test

  api:
    name: API (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Start local Supabase (Postgres + auth schema) before installing Python
      # deps so image pulls overlap with uv/Python setup time.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Start local Supabase
        # Exclude services that tests don't need to keep startup fast.
        # db + auth are always included; rest/realtime/storage are small.
        run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --project apps/api --all-groups

      # Apply schema migrations so the DB has public.profiles / workouts /
      # results / movements before pytest's session-scoped fixtures seed data.
      - name: Apply migrations
        run: uv run --project apps/api alembic -c apps/api/alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:54322/postgres

      - name: Lint (ruff)
        run: uv run --project apps/api ruff check apps/api

      - name: Format check (ruff)
        run: uv run --project apps/api ruff format --check apps/api

      - name: Typecheck (mypy)
        run: uv run --project apps/api mypy apps/api/app

      - name: Test
        run: uv run --project apps/api pytest apps/api/tests -v

  contract:
    name: Contract (openapi spec + TS types drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Python deps
        run: uv sync --project apps/api --all-groups

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Export OpenAPI spec
        run: uv run --project apps/api python apps/api/scripts/export_openapi.py

      - name: Regenerate TypeScript types
        run: pnpm -C apps/web generate-types

      - name: Check for spec drift
        run: |
          git diff --exit-code apps/api/openapi.json \
            || { echo "❌ apps/api/openapi.json is stale — run: uv run --project apps/api python apps/api/scripts/export_openapi.py"; exit 1; }

      - name: Check for types drift
        run: |
          git diff --exit-code apps/web/lib/api/generated.ts \
            || { echo "❌ apps/web/lib/api/generated.ts is stale — run: pnpm -C apps/web generate-types"; exit 1; }

  shared:
    name: Shared (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C packages/shared typecheck

  security:
    name: Security audit (pip-audit + npm audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Python deps
        run: uv sync --project apps/api --all-groups

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: pip-audit
        run: uv tool run pip-audit apps/api
        # Use --ignore-vuln GHSA-XXXX for accepted exceptions; document in HANDOVER.md

      - name: npm audit
        run: pnpm -C apps/web audit --audit-level=high
        # Fails on high+critical only; low/moderate acceptable for invite-only MVP

      - name: Secret scan (git history)
        run: |
          count=$(git log --all -p -- '*.env' '*.env.*' \
            | grep -cE '(SERVICE_ROLE_KEY|ANTHROPIC_API_KEY)=' || true)
          echo "Secret pattern matches in git history: $count"
          [ "$count" -eq "0" ] || { echo "❌ Secrets found in git history"; exit 1; }
          echo "✓ No secrets in history"
