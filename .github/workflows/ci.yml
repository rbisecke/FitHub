name: CI

# Cancel superseded runs on the same branch (preserves all runs on main).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "docs/**"
      - "test/**"
      - "hotfix/**"
  pull_request:
    branches: [main]

jobs:
  # ── Path detection ────────────────────────────────────────────────────────
  # Determines which areas changed so downstream jobs can skip when irrelevant.
  # Skipped jobs satisfy branch-protection required status checks on GitHub.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
      contract: ${{ steps.filter.outputs.contract }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'supabase/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - '.github/workflows/ci.yml'
            shared:
              - 'packages/shared/**'
              - '.github/workflows/ci.yml'
            contract:
              - 'apps/api/**'
              - 'apps/web/lib/api/**'
              - '.github/workflows/ci.yml'
            migrations:
              - 'apps/api/alembic/versions/*.py'

  # ── Web ───────────────────────────────────────────────────────────────────
  web:
    name: Web (typecheck + lint + test)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C apps/web typecheck

      - name: Lint
        run: pnpm -C apps/web lint

      - name: Test
        run: pnpm -C apps/web test

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    name: API (typecheck + lint + test)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Start local Supabase (Postgres + auth schema) before installing Python
      # deps so image pulls overlap with uv/Python setup time.
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.107.0

      - name: Start local Supabase
        # Exclude services that tests don't need to keep startup fast.
        # db + auth are always included; rest/realtime/storage are small.
        run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --project apps/api --all-groups

      # Apply schema migrations so the DB has public.profiles / workouts /
      # results / movements before pytest's session-scoped fixtures seed data.
      - name: Apply migrations
        run: uv run --project apps/api alembic -c apps/api/alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:54322/postgres

      - name: Lint (ruff)
        run: uv run --project apps/api ruff check apps/api

      - name: Format check (ruff)
        run: uv run --project apps/api ruff format --check apps/api

      - name: Typecheck (mypy)
        run: uv run --project apps/api mypy apps/api/app

      - name: Test
        run: uv run --project apps/api pytest apps/api/tests -v

  # ── Contract ──────────────────────────────────────────────────────────────
  contract:
    name: Contract (openapi spec + TS types drift)
    needs: changes
    if: needs.changes.outputs.contract == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Python deps
        run: uv sync --project apps/api --all-groups

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Export OpenAPI spec
        run: uv run --project apps/api python apps/api/scripts/export_openapi.py

      - name: Regenerate TypeScript types
        run: pnpm -C apps/web generate-types

      - name: Check for spec drift
        run: |
          git diff --exit-code apps/api/openapi.json \
            || { echo "❌ apps/api/openapi.json is stale — run: uv run --project apps/api python apps/api/scripts/export_openapi.py"; exit 1; }

      - name: Check for types drift
        run: |
          git diff --exit-code apps/web/lib/api/generated.ts \
            || { echo "❌ apps/web/lib/api/generated.ts is stale — run: pnpm -C apps/web generate-types"; exit 1; }

  # ── Shared ────────────────────────────────────────────────────────────────
  shared:
    name: Shared (typecheck)
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C packages/shared typecheck

  # ── Security ──────────────────────────────────────────────────────────────
  # Always runs — dependency vulnerabilities and secret leaks are not path-gated.
  security:
    name: Security audit (pip-audit + npm audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Python deps
        run: uv sync --project apps/api --all-groups

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: pip-audit
        run: uv tool run pip-audit apps/api
        # Use --ignore-vuln GHSA-XXXX for accepted exceptions; document in HANDOVER.md

      - name: npm audit
        run: pnpm -C apps/web audit --audit-level=high
        # Fails on high+critical only; low/moderate acceptable for invite-only MVP

      - name: Secret scan (git history)
        run: |
          # Match KEY= only when followed by ≥8 non-bracket, non-whitespace chars.
          # This skips empty assignments (ANTHROPIC_API_KEY=) and placeholder
          # values (<local-service-role-key-from-supabase-start>) in .env.example.
          count=$(git log --all -p -- '*.env' '*.env.*' \
            | grep -cE '(SERVICE_ROLE_KEY|ANTHROPIC_API_KEY)=[^<[:space:]]{8,}' || true)
          echo "Secret pattern matches in git history: $count"
          [ "$count" -eq "0" ] || { echo "❌ Secrets found in git history"; exit 1; }
          echo "✓ No secrets in history"

  # ── Migrate production DB ─────────────────────────────────────────────────
  # Runs only on pushes to main when Alembic migration files changed AND the
  # api test job passed. Uses the direct Supabase connection (port 5432) — the
  # PgBouncer pooler (6543) is incompatible with Alembic's DDL statements.
  #
  # Required GitHub secret: PROD_DATABASE_URL
  #   Format: postgresql+psycopg://<user>:<password>@<host>:5432/<db>
  #   Use the Supabase "direct connection" string, NOT the pooler string.
  migrate:
    name: Migrate production database
    needs: [changes, api]
    # Only on main pushes; only when migration files changed; only when api
    # tests passed (guards against a broken migration reaching production).
    # Explicit needs.api.result check is required because GitHub does not
    # automatically skip dependents when a needed job is skipped.
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.migrations == 'true' &&
      needs.api.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"

      # Install only what alembic/env.py needs — avoids pulling torch and
      # sentence-transformers (~2 GB) that the full project sync would require.
      - name: Install migration dependencies
        run: uv pip install --system alembic "psycopg[binary]" python-dotenv

      - name: Apply migrations
        run: alembic -c apps/api/alembic.ini upgrade head
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # ── Commit lint ───────────────────────────────────────────────────────────
  # Enforces conventional commits on PRs; informational only (not a required
  # status check) so it never blocks a merge on its own.
  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@8bc41ff4e7d423d56fa4905f6ff79209a78776c7 # v1.3.0
