name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: input
    id: summary
    attributes:
      label: What happened?
      placeholder: Brief one-line description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Browser:
        - OS:
        - Local or production:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or any other relevant information
    validations:
      required: false
