name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What job is it hired to do?
      placeholder: "I'm frustrated when... / It would be useful to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Be as specific as you can.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Training log
        - AI coach
        - Analytics & load management
        - Plans & adaptations
        - Team sessions
        - Infrastructure & API
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues and discussions for duplicates
          required: true
        - label: For major features — I understand this may be discussed before implementation
          required: false
