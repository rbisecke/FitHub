repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Python: Ruff lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  # TypeScript/JS: Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|css|md)$
        exclude: ^(pnpm-lock\.yaml|apps/web/app/globals\.css|apps/api/openapi\.json)$

  # Sync FastAPI OpenAPI spec on every Python change in apps/api.
  # If openapi.json drifts the commit will fail; re-stage the updated file.
  - repo: local
    hooks:
      - id: export-openapi
        name: Export OpenAPI spec
        language: system
        entry: uv run --project apps/api python apps/api/scripts/export_openapi.py
        files: ^apps/api/.*\.py$
        pass_filenames: false
